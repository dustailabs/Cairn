<svg viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0d0f"/>
      <stop offset="100%" stop-color="#1a1a1d"/>
    </linearGradient>
    <linearGradient id="stone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8e6e1"/>
      <stop offset="100%" stop-color="#9a968d"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="300" fill="url(#bg)"/>

  <!-- stacked cairn stones, right side -->
  <g transform="translate(940,60)">
    <ellipse cx="100" cy="190" rx="92" ry="20" fill="url(#stone)" opacity="0.95"/>
    <ellipse cx="108" cy="150" rx="70" ry="17" fill="url(#stone)" opacity="0.92"/>
    <ellipse cx="92" cy="112" rx="52" ry="14" fill="url(#stone)" opacity="0.9"/>
    <ellipse cx="104" cy="80" rx="34" ry="11" fill="url(#stone)" opacity="0.88"/>
    <ellipse cx="96" cy="55" rx="18" ry="8" fill="url(#stone)" opacity="0.86"/>
  </g>

  <!-- subtle retrieval-trace lines -->
  <g stroke="#4a4a4f" stroke-width="1.4" fill="none" opacity="0.6">
    <path d="M60 230 L 360 230"/>
    <path d="M60 230 L 60 110"/>
    <path d="M60 110 L 220 110"/>
    <path d="M60 170 L 300 170"/>
    <circle cx="220" cy="110" r="3.5" fill="#cfcdc7"/>
    <circle cx="300" cy="170" r="3.5" fill="#cfcdc7"/>
    <circle cx="360" cy="230" r="3.5" fill="#cfcdc7"/>
  </g>

  <text x="60" y="170" font-family="Georgia, 'Playfair Display', serif" font-size="76" fill="#f4f3f1" letter-spacing="2">Cairn</text>
  <text x="62" y="205" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#9a968d" letter-spacing="0.5">Agentic RAG — hybrid retrieval, cited answers</text>

  <text x="62" y="250" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#6b6b6f" letter-spacing="1.5">DUST AI LABS</text>
</svg>
